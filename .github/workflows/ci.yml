name: "CI"
on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.txt"
  workflow_dispatch: # e.g. to manually trigger on foreign PRs

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

defaults:
  run:
    shell: pwsh

jobs:
  cancel-previous-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66 # 0.13.1
        with:
          access_token: ${{ github.token }}

  create-unity-matrix:
    uses: ./.github/workflows/create-unity-matrix.yml
    with:
      event-name: ${{ github.event_name }}
      head-ref: ${{ github.head_ref }}

  sdk:
    strategy:
      matrix:
        include:
          - target: Android
            host: ubuntu-latest
          - target: Linux
            host: ubuntu-latest
          - target: LinuxNative
            host: ubuntu-latest
          - target: Windows
            host: windows-latest
          - target: WindowsNative
            host: windows-latest
          - target: Cocoa
            host: macos-latest
          - target: MacOSNative
            host: macos-latest
    uses: ./.github/workflows/sdk.yml
    with:
      target: ${{ matrix.target }}
      runsOn: ${{ matrix.host }}

  build-unity-sdk:
    name: Build Unity SDK
    secrets: inherit
    permissions:
      actions: read
      checks: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Building the SDK with Unity 2022 and newer requires ns2.1 - skipping for now
        unity-version: ["2021.3"]
    uses: ./.github/workflows/build.yml
    with:
      unity-version: ${{ matrix.unity-version }}
    
  package-validation:
    name: UPM Package validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}

      - name: Download UPM package
        uses: ./.github/actions/wait-for-artifact
        with:
          name: package-release

      - name: Check snapshot
        id: snapshot-check
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          & ./test/Scripts.Tests/test-pack-contents.ps1
          "result=$LASTEXITCODE" >> $env:GITHUB_OUTPUT

      - name: Update snapshot for dependency bumps
        if: steps.snapshot-check.outputs.result != '0' && github.event_name == 'pull_request' && startsWith(github.head_ref, 'deps/')
        run: |
          ./test/Scripts.Tests/test-pack-contents.ps1 accept
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/Scripts.Tests/package-release.zip.snapshot
          git commit -m "Update package release snapshot"
          git push

      - name: Fail on unexpected snapshot changes
        if: steps.snapshot-check.outputs.result != '0' && !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'deps/'))
        run: |
          Write-Error "Package contents do not match snapshot. Run './test/Scripts.Tests/test-pack-contents.ps1 accept' locally and commit the update."
          exit 1

  # This produces the `samples/IntegrationTest` as `test-${{ matrix.unity-version }}`.
  test-create:
    name: Create ${{ matrix.unity-version }} Test Project
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix) }}
    uses: ./.github/workflows/test-create.yml
    with:
      unity-version: ${{ matrix.unity-version }}

  # A Linux, docker-based build to prepare a WebGL player. The tests run in `test-run-webgl`.
  test-build-webgl:
    name: Build ${{ matrix.platform }} ${{ matrix.unity-version }} Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-create, create-unity-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
        platform: ["WebGL"]
        include:
          - platform: WebGL
            build_platform: WebGL
    env:
      UNITY_PATH: docker exec unity unity-editor
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@f68fdb76e2ea636224182cfb7377ff9a1708f9b8 # v1.3.0
        with:
          android: true
          dotnet: false
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Docker Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }} 
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Start the Unity docker container
        run: ./scripts/ci-docker.sh "$UNITY_VERSION" "$PLATFORM_WITH_SUFFIX" "$UNITY_LICENSE_SERVER_CONFIG"
        shell: bash
        env:
          UNITY_VERSION: ${{ matrix.unity-version }}
          PLATFORM: ${{ matrix.platform }}
          IMAGE_SUFFIX: ${{ matrix.image-suffix }}
          PLATFORM_WITH_SUFFIX: ${{ matrix.platform }}${{ matrix.image-suffix }}
          UNITY_LICENSE_SERVER_CONFIG: ${{ secrets.UNITY_LICENSE_SERVER_CONFIG }}

      - name: Download IntegrationTest project
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-${{ matrix.unity-version }}

      - name: Extract project archive
        run: tar -xvzf test-project.tar.gz

      - name: Restore Unity Library cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: samples/IntegrationTest/Library
          key: it-library-ubuntu-${{ matrix.unity-version }}-${{ github.run_id }}
          restore-keys: |
            it-library-ubuntu-${{ matrix.unity-version }}-

      - name: Restore cached build without Sentry
        id: cache-build-nosentry
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: samples/IntegrationTest/Build-NoSentry
          key: build-nosentry-${{ matrix.build_platform }}-${{ matrix.unity-version }}

      - name: Build without Sentry SDK
        if: steps.cache-build-nosentry.outputs.cache-hit != 'true'
        run: ./test/Scripts.Integration.Test/build-project.ps1 -UnityPath "$env:UNITY_PATH" -Platform "$env:BUILD_PLATFORM" -BuildDirName "Build-NoSentry"
        env:
          BUILD_PLATFORM: ${{ matrix.build_platform }}

      - name: Save cached build without Sentry
        if: github.ref == 'refs/heads/main' && steps.cache-build-nosentry.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: samples/IntegrationTest/Build-NoSentry
          key: build-nosentry-${{ matrix.build_platform }}-${{ matrix.unity-version }}

      - name: Download UPM package
        uses: ./.github/actions/wait-for-artifact
        with:
          name: package-release

      - name: Extract UPM package
        run: ./test/Scripts.Integration.Test/extract-package.ps1

      - name: Add Sentry to the project
        run: ./test/Scripts.Integration.Test/add-sentry.ps1 -UnityPath "$env:UNITY_PATH" -PackagePath "test-package-release"

      - name: Download DependencyConflict package
        uses: ./.github/actions/wait-for-artifact
        with:
          name: dependency-conflict-package
          path: dependency-conflict-package

      - name: Add DependencyConflict to the project
        if: ${{ !startsWith(matrix.unity-version, '2021') }}
        run: ./test/Scripts.Integration.Test/add-dependency-conflict.ps1 -PackagePath "dependency-conflict-package"

      - name: Disable DependencyConflict (WebGL 2021)
        if: ${{ startsWith(matrix.unity-version, '2021') }}
        run: ./test/Scripts.Integration.Test/add-dependency-conflict.ps1 -Disable

      - name: Configure Sentry
        run: ./test/Scripts.Integration.Test/configure-sentry.ps1 -UnityPath "$env:UNITY_PATH" -Platform "$env:BUILD_PLATFORM"
        env:
          BUILD_PLATFORM: ${{ matrix.build_platform }}
          SENTRY_DSN: ${{ secrets.SENTRY_TEST_DSN }}

      - name: Build Project
        run: ./test/Scripts.Integration.Test/build-project.ps1 -UnityPath "$env:UNITY_PATH" -Platform "$env:BUILD_PLATFORM" -UnityVersion "$env:UNITY_VERSION"
        env:
          BUILD_PLATFORM: ${{ matrix.build_platform }}
          UNITY_VERSION: ${{ matrix.unity-version }}

      - name: Compare build sizes
        run: ./test/Scripts.Integration.Test/measure-build-size.ps1 -Path1 "samples/IntegrationTest/Build-NoSentry" -Path2 "samples/IntegrationTest/Build" -Platform "$env:BUILD_PLATFORM" -UnityVersion "$env:UNITY_VERSION"
        env:
          BUILD_PLATFORM: ${{ matrix.build_platform }}
          UNITY_VERSION: ${{ matrix.unity-version }}

      - name: Upload build size measurement
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-size-${{ matrix.platform }}-${{ matrix.unity-version }}
          path: build-size-measurements/*.json
          retention-days: 1

      # We create tar explicitly because upload-artifact is slow for many files.
      - name: Create archive
        run: |
          Remove-Item -Recurse -Force samples/IntegrationTest/Build/*_BackUpThisFolder_ButDontShipItWithYourGame -ErrorAction SilentlyContinue
          Copy-Item -Force unity.log samples/IntegrationTest/Build/ -ErrorAction SilentlyContinue
          tar -cvzf test-app-webgl.tar.gz samples/IntegrationTest/Build

      - name: Upload test app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testapp-webgl-compiled-${{ matrix.unity-version }}
          if-no-files-found: error
          path: test-app-webgl.tar.gz
          retention-days: 14
          
      # Library cache for the shared `ubuntu` flavour is written only by the Linux job
      # (see test-build-linux.yml) - the other ubuntu targets are restore-only.
      - name: Upload IntegrationTest project on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failed-project-${{ matrix.platform }}-${{ matrix.unity-version }}
          path: |
            samples/IntegrationTest
            !samples/IntegrationTest/Build/*_BackUpThisFolder_ButDontShipItWithYourGame
          # Lower retention period - we only need this to retry CI.
          retention-days: 14

  test-build-android:
    name: Build Android ${{ matrix.unity-version }} Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-create, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix) }}
    uses: ./.github/workflows/test-build-android.yml
    with:
      unity-version: ${{ matrix.unity-version }}

  test-run-android:
    name: Run Android ${{ matrix.unity-version }} Integration Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-build-android, create-unity-matrix]
    secrets: inherit
    uses: ./.github/workflows/test-run-android.yml
    with:
      unity-version: ${{ matrix.unity-version }}
      api-level: ${{ matrix.api-level }}
      init-type: ${{ matrix.init-type }}
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
        # api-level: [30, 31, 34]
        api-level: [30]
        init-type: ["runtime", "buildtime"]

  test-build-ios:
    name: Build iOS ${{ matrix.unity-version }} Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-create, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix) }}
    uses: ./.github/workflows/test-build-ios.yml
    with:
      unity-version: ${{ matrix.unity-version }}

  test-compile-ios:
    name: Compile iOS ${{ matrix.unity-version }} Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-build-ios, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
        init-type: ["runtime", "buildtime"]
    uses: ./.github/workflows/test-compile-ios.yml
    with:
      unity-version: ${{ matrix.unity-version }}
      init-type: ${{ matrix.init-type }}

  test-run-ios:
    name: Run iOS ${{ matrix.unity-version }} Integration Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-compile-ios, create-unity-matrix]
    uses: ./.github/workflows/test-run-ios.yml
    with:
      unity-version: ${{ matrix.unity-version }}
      ios-version: ${{ matrix.ios-version }}
      init-type: ${{ matrix.init-type }}
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
        # On PRs only the newest simulator runs; `17.0` is an OS-compat axis (not SDK behavior) and runs on main.
        ios-version: ${{ github.event_name == 'pull_request' && fromJSON('["latest"]') || fromJSON('["17.0", "latest"]') }}
        init-type: ["runtime", "buildtime"]
        # Check https://support.apple.com/en-us/HT201222 for the latest minor version for a given major one.
        # https://developer.apple.com/support/app-store/ shows that of all iOS devices
        # - `iOS 18`: 88 %
        # - `iOS 17`: 17 %
        # - the rest:  4 %
        # as of August, 2025. Therefore, let's stick to testing iOS 17 and `latest` for now.
        # Numbers as string otherwise GH will reformat the runtime numbers removing the fractions.
        # Also make sure to match the versions available here:
        #  - https://github.com/actions/runner-images/blob/main/images/macos/macos-14-Readme.md

  test-run-webgl:
    name: Run WebGL ${{ matrix.unity-version }} Integration Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-build-webgl, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
    uses: ./.github/workflows/test-run-webgl.yml
    with:
      unity-version: ${{ matrix.unity-version }}

  test-build-linux:
    name: Build Linux ${{ matrix.unity-version }} Integration Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-create, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
    uses: ./.github/workflows/test-build-linux.yml
    with:
      unity-version: ${{ matrix.unity-version }}

  test-build-windows:
    name: Build Windows ${{ matrix.unity-version }} Integration Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-create, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
    uses: ./.github/workflows/test-build-windows.yml
    with:
      unity-version: ${{ matrix.unity-version }}

  test-build-macos:
    name: Build macOS ${{ matrix.unity-version }} Integration Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-create, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
    uses: ./.github/workflows/test-build-macos.yml
    with:
      unity-version: ${{ matrix.unity-version }}

  test-run-linux:
    name: Run Linux ${{ matrix.backend }} ${{ matrix.unity-version }} Integration Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-build-linux, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
        backend: ["breakpad", "native"]
    uses: ./.github/workflows/test-run-desktop.yml
    with:
      unity-version: ${{ matrix.unity-version }}
      platform: linux
      backend: ${{ matrix.backend }}

  test-run-windows:
    name: Run Windows ${{ matrix.backend }} ${{ matrix.unity-version }} Integration Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-build-windows, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
        backend: ["crashpad", "native"]
    uses: ./.github/workflows/test-run-desktop.yml
    with:
      unity-version: ${{ matrix.unity-version }}
      platform: windows
      backend: ${{ matrix.backend }}

  test-run-macos:
    name: Run macOS ${{ matrix.backend }} ${{ matrix.unity-version }} Integration Test
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-build-macos, create-unity-matrix]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        unity-version: ${{ fromJSON(needs.create-unity-matrix.outputs.unity-matrix).unity-version }}
        backend: ["cocoa", "native"]
    uses: ./.github/workflows/test-run-desktop.yml
    with:
      unity-version: ${{ matrix.unity-version }}
      platform: macos
      backend: ${{ matrix.backend }}

  build-size-summary:
    name: Build Size
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/heads/release/') }}
    needs: [test-build-webgl, test-build-android, test-compile-ios, test-build-linux, test-build-windows, test-build-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all build size measurements
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: build-size-*
          path: build-size-measurements

      - name: Create consolidated summary
        shell: pwsh
        run: ./scripts/create-build-size-summary.ps1