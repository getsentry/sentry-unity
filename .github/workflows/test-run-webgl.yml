name: "Test: Run WebGL"
on:
  workflow_call:
    inputs:
      unity-version:
        required: true
        type: string

defaults:
  run:
    shell: pwsh

jobs:
  run:
    name: WebGL ${{ inputs.unity-version }}
    runs-on: ubuntu-latest
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_TEST_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize app-runner submodule
        run: git submodule update --init modules/app-runner
        shell: bash

      - name: Download test app artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: testapp-webgl-compiled-${{ inputs.unity-version }}

      - name: Extract test app
        run: tar -xvzf test-app-webgl.tar.gz

      - name: Install Selenium
        run: pip3 install --upgrade selenium
        shell: bash

      - name: Run Integration Tests
        timeout-minutes: 20
        run: |
          $env:SENTRY_TEST_PLATFORM = "WebGL"
          $env:SENTRY_TEST_APP = "samples/IntegrationTest/Build"
          $env:SENTRY_TEST_UNITY_VERSION = "${{ inputs.unity-version }}"
          Invoke-Pester -Path test/IntegrationTest/Integration.Tests.ps1 -CI

      - name: Upload test results on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testapp-webgl-logs-${{ inputs.unity-version }}
          path: |
            test/IntegrationTest/results/
          retention-days: 14
