name: "Test: Run Desktop"
on:
  workflow_call:
    inputs:
      unity-version:
        required: true
        type: string
      platform:
        required: true
        type: string
        description: "linux or windows"

defaults:
  run:
    shell: pwsh

jobs:
  run:
    name: ${{ inputs.platform }} ${{ inputs.unity-version }}
    runs-on: ${{ inputs.platform == 'linux' && 'ubuntu-latest' || 'windows-latest' }}
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_TEST_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize app-runner submodule
        run: git submodule update --init modules/app-runner
        shell: bash

      - name: Download test app artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: testapp-desktop-compiled-${{ inputs.unity-version }}-${{ inputs.platform }}

      - name: Extract test app
        run: tar -xvzf test-app-desktop.tar.gz

      - name: Set executable permission
        if: inputs.platform == 'linux'
        run: chmod +x samples/IntegrationTest/Build/test
        shell: bash

      - name: Run Integration Tests (Linux)
        if: inputs.platform == 'linux'
        timeout-minutes: 20
        run: |
          xvfb-run pwsh -Command '
            $env:SENTRY_TEST_PLATFORM = "Desktop";
            $env:SENTRY_TEST_APP = "samples/IntegrationTest/Build/test";
            Invoke-Pester -Path test/IntegrationTest/Integration.Tests.ps1 -CI'
        shell: bash

      - name: Run Integration Tests (Windows)
        if: inputs.platform == 'windows'
        timeout-minutes: 20
        run: |
          $env:SENTRY_TEST_PLATFORM = "Desktop"
          $env:SENTRY_TEST_APP = "samples/IntegrationTest/Build/test.exe"
          Invoke-Pester -Path test/IntegrationTest/Integration.Tests.ps1 -CI

      - name: Upload test results on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testapp-desktop-logs-${{ inputs.platform }}-${{ inputs.unity-version }}
          path: |
            test/IntegrationTest/results/
          retention-days: 14
