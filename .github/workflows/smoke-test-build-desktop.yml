name: "IntegrationTest: Build Desktop"
on:
  workflow_call:
    inputs:
      unity-version:
        required: true
        type: string
      os:
        required: true
        type: string
        description: '"windows" or "linux"'

defaults:
  run:
    shell: pwsh

jobs:
  build:
    name: ${{ inputs.os }} ${{ inputs.unity-version }}
    runs-on: ${{ inputs.os == 'windows' && 'windows-latest' || 'ubuntu-latest' }}
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      UNITY_PATH: ${{ inputs.os == 'windows' && 'docker exec -w C:\sentry-unity unity cmd /c unity-editor' || 'docker exec unity unity-editor' }}
      UNITY_VERSION: ${{ inputs.unity-version }}
      BUILD_PLATFORM: ${{ inputs.os == 'windows' && 'Windows' || 'Linux' }}

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Free Disk Space (Ubuntu)
        if: ${{ inputs.os == 'linux' }}
        uses: jlumbroso/free-disk-space@f68fdb76e2ea636224182cfb7377ff9a1708f9b8 # v1.3.0
        with:
          android: true
          dotnet: false
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Log into Docker
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # pinned v3
        with:
          registry: ghcr.io
          username: ${{ env.GITHUB_ACTOR }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start the Unity docker container (Linux)
        if: ${{ inputs.os == 'linux' }}
        run: ./scripts/ci-docker.sh "$UNITY_VERSION" "Linux-il2cpp" "$UNITY_LICENSE_SERVER_CONFIG"
        shell: bash
        env:
          UNITY_LICENSE_SERVER_CONFIG: ${{ secrets.UNITY_LICENSE_SERVER_CONFIG }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Start the Unity docker container (Windows)
        if: ${{ inputs.os == 'windows' }}
        run: ./scripts/ci-docker-windows.ps1 -UnityPrefix "$env:UNITY_VERSION" -ImageVariant "windows-il2cpp" -LicenseConfig "$env:UNITY_LICENSE_SERVER_CONFIG"
        env:
          UNITY_LICENSE_SERVER_CONFIG: ${{ secrets.UNITY_LICENSE_SERVER_CONFIG }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Download IntegrationTest project
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: smoke-test-${{ env.UNITY_VERSION }}

      - name: Extract project archive
        run: tar -xvzf test-project.tar.gz

      - name: Cache Unity Library
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: samples/IntegrationTest/Library
          key: Library-IntegrationTest-${{ inputs.os }}-${{ env.UNITY_VERSION }}-v1
          restore-keys: |
            Library-IntegrationTest-${{ inputs.os }}-${{ env.UNITY_VERSION }}-
            Library-IntegrationTest-${{ inputs.os }}-

      - name: Restore cached build without Sentry
        id: cache-build-nosentry
        uses: actions/cache@v4
        with:
          path: samples/IntegrationTest/Build-NoSentry
          key: build-nosentry-${{ env.BUILD_PLATFORM }}-${{ inputs.unity-version }}

      - name: Build without Sentry SDK
        if: steps.cache-build-nosentry.outputs.cache-hit != 'true'
        run: ./test/Scripts.Integration.Test/build-project.ps1 -UnityPath "$env:UNITY_PATH" -Platform "$env:BUILD_PLATFORM" -CheckSymbols:$false -BuildDirName "Build-NoSentry"

      - name: Download UPM package
        uses: vaind/download-artifact@e7141b6a94ef28aa3d828b52830cfa1f406a1848 # v4-with-wait-timeout
        with:
          name: package-release
          wait-timeout: 3600

      - name: Extract UPM package
        run: ./test/Scripts.Integration.Test/extract-package.ps1

      - name: Add Sentry to the project
        run: ./test/Scripts.Integration.Test/add-sentry.ps1 -UnityPath "$env:UNITY_PATH" -PackagePath "test-package-release"

      - name: Configure Sentry
        run: ./test/Scripts.Integration.Test/configure-sentry.ps1 -UnityPath "$env:UNITY_PATH" -Platform "$env:BUILD_PLATFORM" -TestMode "integration"
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_TEST_DSN }}

      - name: Build with Sentry SDK
        run: ./test/Scripts.Integration.Test/build-project.ps1 -UnityPath "$env:UNITY_PATH" -Platform "$env:BUILD_PLATFORM" -CheckSymbols:$false -UnityVersion "$env:UNITY_VERSION"

      - name: Compare build sizes
        run: ./test/Scripts.Integration.Test/measure-build-size.ps1 -Path1 "samples/IntegrationTest/Build-NoSentry" -Path2 "samples/IntegrationTest/Build" -Platform "$env:BUILD_PLATFORM" -UnityVersion "$env:UNITY_VERSION"

      - name: Upload build size measurement
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-size-${{ env.BUILD_PLATFORM }}-${{ env.UNITY_VERSION }}
          path: build-size-measurements/*.json
          retention-days: 1

      # We create tar explicitly because upload-artifact is slow for many files.
      - name: Create archive
        run: |
          Remove-Item -Recurse -Force samples/IntegrationTest/Build/*_BackUpThisFolder_ButDontShipItWithYourGame -ErrorAction SilentlyContinue
          tar -cvzf test-app-desktop.tar.gz samples/IntegrationTest/Build

      - name: Upload test app
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: testapp-desktop-compiled-${{ env.UNITY_VERSION }}-${{ inputs.os }}
          if-no-files-found: error
          path: test-app-desktop.tar.gz
          retention-days: 14

      - name: Docker diagnostics on failure
        if: ${{ failure() }}
        run: |
          Write-Host "=== Docker container status ==="
          docker ps -a --filter "name=^/unity$"

          if ("${{ inputs.os }}" -eq "windows") {
            Write-Host "`n=== Working directory ==="
            docker exec unity cmd /c cd

            Write-Host "`n=== unity-editor.cmd exists? ==="
            docker exec unity cmd /c "if exist C:\Windows\unity-editor.cmd (echo YES & type C:\Windows\unity-editor.cmd) else (echo NO)"

            Write-Host "`n=== Test unity-editor wrapper ==="
            docker exec -w C:\sentry-unity unity cmd /c "unity-editor -quit -batchmode -nographics 2>&1"

            Write-Host "`n=== Unity log from container ==="
            docker exec unity cmd /c "if exist C:\sentry-unity\unity.log (type C:\sentry-unity\unity.log) else (echo unity.log not found at C:\sentry-unity)"

            Write-Host "`n=== Check for log in default locations ==="
            docker exec unity powershell -Command "Get-ChildItem -Path C:\ -Filter unity.log -Recurse -Depth 2 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }"
          } else {
            Write-Host "`n=== Working directory ==="
            docker exec unity pwd

            Write-Host "`n=== Unity log from container ==="
            docker exec unity cat /sentry-unity/unity.log 2>&1 || echo "unity.log not found"
          }
        continue-on-error: true

      - name: Upload IntegrationTest project on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: failed-project-desktop-${{ inputs.os }}-${{ env.UNITY_VERSION }}
          path: |
            samples/IntegrationTest
            unity.log
            !samples/IntegrationTest/Build/*_BackUpThisFolder_ButDontShipItWithYourGame
          retention-days: 14
