name: "Test: Build iOS"
on:
  workflow_call:
    inputs:
      unity-version:
        required: true
        type: string
  
defaults:
  run:
    shell: pwsh
  
jobs:
  build:
    name: ${{ inputs.unity-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: iOS
            check_symbols: false
            build_platform: iOS
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      UNITY_PATH: docker exec unity unity-editor
      UNITY_VERSION: ${{ inputs.unity-version }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ env.GITHUB_ACTOR }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start the Unity docker container
        run: ./scripts/ci-docker.sh "$UNITY_VERSION" "iOS" "$UNITY_LICENSE_SERVER_CONFIG"
        shell: bash
        env:
          UNITY_LICENSE_SERVER_CONFIG: ${{ secrets.UNITY_LICENSE_SERVER_CONFIG }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Download IntegrationTest project
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-${{ env.UNITY_VERSION }}

      - name: Extract project archive
        run: tar -xvzf test-project.tar.gz

      - name: Cache Unity Library
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: samples/IntegrationTest/Library
          key: Library-IntegrationTest-iOS-${{ env.UNITY_VERSION }}-v1
          restore-keys: |
            Library-IntegrationTest-iOS-${{ env.UNITY_VERSION }}-
            Library-IntegrationTest-iOS-

      - name: Restore cached build without Sentry
        id: cache-build-nosentry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: samples/IntegrationTest/Build-NoSentry
          key: build-nosentry-iOS-${{ inputs.unity-version }}

      - name: Build without Sentry SDK
        if: steps.cache-build-nosentry.outputs.cache-hit != 'true'
        run: ./test/Scripts.Integration.Test/build-project.ps1 -UnityPath "$env:UNITY_PATH" -Platform "iOS" -BuildDirName "Build-NoSentry"

      - name: Create archive for build without Sentry
        shell: bash
        run: |
          rm -rf samples/IntegrationTest/Build-NoSentry/*_BackUpThisFolder_ButDontShipItWithYourGame
          tar -cvzf test-app-no-sentry.tar.gz samples/IntegrationTest/Build-NoSentry

      - name: Upload build without Sentry
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testapp-ios-no-sentry-${{ env.UNITY_VERSION }}
          path: test-app-no-sentry.tar.gz
          retention-days: 1

      - name: Download UPM package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-release

      - name: Extract UPM package
        run: ./test/Scripts.Integration.Test/extract-package.ps1

      - name: Add Sentry to the project
        run: ./test/Scripts.Integration.Test/add-sentry.ps1 -UnityPath "$env:UNITY_PATH" -PackagePath "test-package-release"

      - name: Configure Sentry
        run: ./test/Scripts.Integration.Test/configure-sentry.ps1 -UnityPath "$env:UNITY_PATH" -Platform "$env:BUILD_PLATFORM"
        env:
          BUILD_PLATFORM: ${{ matrix.build_platform }}
          SENTRY_DSN: ${{ secrets.SENTRY_TEST_DSN }}

      - name: Build Project with runtime initialization
        run: ./test/Scripts.Integration.Test/build-project.ps1 -UnityPath "$env:UNITY_PATH" -Platform "$env:BUILD_PLATFORM" -UnityVersion "$env:UNITY_VERSION"
        env:
          BUILD_PLATFORM: ${{ matrix.build_platform }}

      # We create tar explicitly because upload-artifact is slow for many files.
      - name: Create archive (runtime initialization)
        shell: bash
        run: |
          # Note: remove local.properties file that contains Android SDK & NDK paths in the Unity installation.
          rm -rf samples/IntegrationTest/Build/*_BackUpThisFolder_ButDontShipItWithYourGame
          tar -cvzf test-app-runtime.tar.gz samples/IntegrationTest/Build

      # Upload runtime initialization build
      - name: Upload test app (runtime initialization)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testapp-ios-${{ env.UNITY_VERSION }}-runtime
          if-no-files-found: error
          path: test-app-runtime.tar.gz
          retention-days: 14

      - name: Overwrite IntegrationOptionsConfiguration for build-time initialization
        run: |
          $optionsPath = "samples/IntegrationTest/Assets/Scripts/IntegrationOptionsConfiguration.cs"
          $content = Get-Content $optionsPath -Raw
          $content = $content -replace 'IosNativeInitializationType = NativeInitializationType.Runtime', 'IosNativeInitializationType = NativeInitializationType.BuildTime'
          Set-Content $optionsPath $content

      - name: Build Project with build-time initialization
        run: ./test/Scripts.Integration.Test/build-project.ps1 -UnityPath "$env:UNITY_PATH" -Platform "$env:BUILD_PLATFORM" -UnityVersion "$env:UNITY_VERSION"
        env:
          BUILD_PLATFORM: ${{ matrix.build_platform }}

      - name: Create archive (build-time initialization)
        shell: bash
        run: |
          rm -rf samples/IntegrationTest/Build/*_BackUpThisFolder_ButDontShipItWithYourGame
          tar -cvzf test-app-buildtime.tar.gz samples/IntegrationTest/Build

      # Upload build-time initialization build
      - name: Upload test app (build-time initialization)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testapp-ios-${{ env.UNITY_VERSION }}-buildtime
          if-no-files-found: error
          path: test-app-buildtime.tar.gz
          retention-days: 14
          
      - name: Upload IntegrationTest project on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failed-project-ios-${{ env.UNITY_VERSION }}
          path: |
            samples/IntegrationTest
            !samples/IntegrationTest/Build/*_BackUpThisFolder_ButDontShipItWithYourGame
          # Lower retention period - we only need this to retry CI.
          retention-days: 14