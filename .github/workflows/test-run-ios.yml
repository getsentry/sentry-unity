name: "Test: Run iOS"
on:
  workflow_call:
    inputs:
      unity-version:
        required: true
        type: string
      ios-version:
        required: true
        type: string
      init-type:
        required: true
        type: string
    # Map the workflow outputs to job outputs
    outputs:
      status:
        description: "Integration test status"
        value: ${{ jobs.run.outputs.status }}

defaults:
  run:
    shell: pwsh

jobs:
  run:
    name: ${{ inputs.unity-version }} ${{ inputs.ios-version }} ${{ inputs.init-type }}
    runs-on: macos-14 # Pinning to get the oldest, supported version of iOS simulator
    # Map the job outputs to step outputs
    outputs:
      status: ${{ steps.integration-test.outputs.status }}
    env:
      UNITY_VERSION: ${{ inputs.unity-version }}
      IOS_VERSION: ${{ inputs.ios-version }}
      INIT_TYPE: ${{ inputs.init-type }}
      ARTIFACTS_PATH: samples/IntegrationTest/test-artifacts/
      SENTRY_DSN: ${{ secrets.SENTRY_TEST_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize app-runner submodule
        run: git submodule update --init modules/app-runner
        shell: bash

      - name: Download app artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: testapp-ios-compiled-${{ env.UNITY_VERSION }}-${{ env.INIT_TYPE }}
          path: samples/IntegrationTest/Build

      - name: List downloaded files
        run: |
          Get-ChildItem -Path "samples/IntegrationTest/Build" -Recurse

      - name: Set Xcode for iOS version ${{ env.IOS_VERSION }}
        if: ${{ env.IOS_VERSION != 'latest'}}
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '15.0' # to run iOS 17.0 we need Xcode 15.0

      - name: Run iOS Integration Tests
        id: integration-test
        timeout-minutes: 20
        env:
          SENTRY_IOS_VERSION: ${{ inputs.ios-version }}
        run: |
          $env:SENTRY_TEST_PLATFORM = "iOS"
          $env:SENTRY_TEST_APP = "samples/IntegrationTest/Build/IntegrationTest.app"
          Invoke-Pester -Path test/IntegrationTest/Integration.Tests.ps1 -CI
          echo "status=success" >> $env:GITHUB_OUTPUT

      - name: Upload test results on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testapp-ios-logs-${{ env.IOS_VERSION }}-${{ env.UNITY_VERSION }}-${{ env.INIT_TYPE }}
          path: |
            ${{ env.ARTIFACTS_PATH }}
            test/IntegrationTest/results/
          retention-days: 14
