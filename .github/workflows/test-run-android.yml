name: "Test: Run Android"
on:
  workflow_call:
    inputs:
      unity-version:
        required: true
        type: string
      api-level:
        required: true
        type: string
      init-type:
        required: true
        type: string
    # Map the workflow outputs to job outputs
    outputs:
      status:
        description: "Integration test status"
        value: ${{ jobs.run.outputs.status }}

defaults:
  run:
    shell: pwsh

jobs:
  run:
    name: ${{ inputs.unity-version }} ${{ inputs.api-level }} ${{ inputs.init-type }}
    # Unity 6000.5+ builds ARM64 (x86_64 was removed), so we run an arm64-v8a emulator. The
    # GitHub-hosted arm64 Linux runners have no /dev/kvm, so the only place to run an accelerated
    # arm64 emulator is an Apple Silicon macOS runner (Hypervisor.Framework). Older Unity versions
    # keep x86_64 and run the emulator on the standard x86 Linux runner with KVM.
    # Keep in sync with the "Determine emulator architecture" step below and Builder.cs.
    runs-on: ${{ inputs.unity-version == '6000.5' && 'macos-15' || 'ubuntu-latest' }}
    env:
      ARTIFACTS_PATH: samples/IntegrationTest/test-artifacts/
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      SENTRY_DSN: ${{ secrets.SENTRY_TEST_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    # Map the job outputs to step outputs
    outputs:
      status: ${{ steps.integration-test.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize app-runner submodule
        run: git submodule update --init modules/app-runner
        shell: bash

      - name: Download test app artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: testapp-android-compiled-${{ inputs.unity-version }}-${{ inputs.init-type }}
          path: samples/IntegrationTest/Build

      # Unity 6000.5 removed x86_64 as an Android build target, so from there on the test app is
      # built for ARM64 and runs on an arm64-v8a emulator (macOS runner). Older versions keep
      # x86_64 and run on the x86 Linux runner; running the app natively avoids ndk_translation,
      # which crashes with SIGILL on unsupported instructions.
      # Keep in sync with the runs-on selection above and Builder.cs.
      - name: Determine emulator architecture
        id: arch
        shell: bash
        run: |
          case "${{ inputs.unity-version }}" in
            6000.5) arch="arm64-v8a" ;;
            *)      arch="x86_64" ;;
          esac
          echo "arch=$arch" >> "$GITHUB_OUTPUT"
          echo "Using emulator arch: $arch"

      # KVM and the AVD directory workarounds only apply to the x86 Linux runner; the macOS runner
      # uses Hypervisor.Framework and ships a working Android SDK out of the box.
      # See https://github.blog/changelog/2023-02-23-hardware-accelerated-android-virtualization-on-actions-windows-and-linux-larger-hosted-runners/
      - name: Enable KVM group perms
        if: ${{ steps.arch.outputs.arch == 'x86_64' }}
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Make sure that the required directories and .cfg do exists. Workaround to keep ADV happy on `ubuntu-latest`.
      - name: Setup Android directories
        if: ${{ steps.arch.outputs.arch == 'x86_64' }}
        run: |
          mkdir -p $HOME/.android
          mkdir -p $HOME/.android/avd
          touch $HOME/.android/repositories.cfg

      - name: Add Android build-tools to PATH
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          echo "Found build-tools at: $BUILD_TOOLS_DIR"
          echo "$BUILD_TOOLS_DIR" >> $GITHUB_PATH
        shell: bash

      - name: Run Android Integration Tests
        uses: reactivecircus/android-emulator-runner@0a638108440efd5c7f980e6ba145dbcdd8f32009 # v2.37.0
        id: integration-test
        timeout-minutes: 30
        with:
          api-level: ${{ inputs.api-level }}
          target: 'google_apis'
          channel: 'stable'
          force-avd-creation: true
          disable-animations: true
          disable-spellchecker: true
          emulator-options: >
            -no-window
            -no-snapshot-save
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -camera-front none
            -timezone US/Pacific
            -no-metrics
          arch: ${{ steps.arch.outputs.arch }}
          script: |
            adb wait-for-device
            adb shell input keyevent 82
            adb devices -l
            pwsh -Command '$env:SENTRY_TEST_PLATFORM = "Android"; $env:SENTRY_TEST_APP = "samples/IntegrationTest/Build/test.apk"; Invoke-Pester -Path test/IntegrationTest/Integration.Tests.ps1 -CI'

      - name: Upload test results on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: testapp-android-logs-${{ inputs.api-level }}-${{ inputs.unity-version }}
          path: |
            ${{ env.ARTIFACTS_PATH }}
            test/IntegrationTest/results/
          retention-days: 14
